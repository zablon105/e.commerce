<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e.commerce | Cart</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <div class="brand-group">
    <div class="logo">e.commerce</div>
    <p class="brand-tag">Your cart summary</p>
  </div>
  <a class="back-link" href="index.html"><i class="fas fa-arrow-left"></i> Back to Store</a>
</header>
<main class="page-shell">
  <section class="cart-panel page-panel">
    <div class="section-title-row">
      <div>
        <h1>Shopping Cart</h1>
        <p>Review your selections and prepare for checkout.</p>
      </div>
    </div>
    <ul id="cart-items" class="cart-items"></ul>
    <div id="cart-empty" class="empty" hidden>No items in your cart yet.</div>
    <div class="cart-summary">
      <span>Total</span>
      <strong>Ksh <span id="total">0</span></strong>
    </div>
    <button class="checkout-btn" type="button">Proceed to Checkout</button>
  </section>
</main>
<script>
const currencyLabel = 'Ksh';
let cart = JSON.parse(localStorage.getItem('cart')) || [];

function renderCart(){
    const cartItemsEl = document.getElementById('cart-items');
    const totalEl = document.getElementById('total');
    const emptyEl = document.getElementById('cart-empty');

    cartItemsEl.innerHTML = '';

    if(cart.length === 0){
        emptyEl.hidden = false;
        totalEl.textContent = '0';
        return;
    }

    emptyEl.hidden = true;

    let total = 0;
    cart.forEach(item => {
        const li = document.createElement('li');
        li.className = 'cart-item';

        const info = document.createElement('div');
        info.className = 'cart-item-info';
        info.innerHTML = `<strong>${item.name}</strong><span>${currencyLabel} ${item.price} × ${item.quantity}</span>`;

        const actions = document.createElement('div');
        actions.className = 'cart-item-actions';

        const removeBtn = document.createElement('button');
        removeBtn.innerHTML = '<i class="fas fa-trash"></i> Remove';
        removeBtn.className = 'remove-cart-btn';
        removeBtn.type = 'button';
        removeBtn.onclick = () => removeFromCart(item.name);

        actions.appendChild(removeBtn);
        li.appendChild(info);
        li.appendChild(actions);
        cartItemsEl.appendChild(li);

        total += item.price * item.quantity;
    });

    totalEl.textContent = total;
}

function removeFromCart(name){
    cart = cart.filter(item => item.name !== name);
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
}

renderCart();
</script>
</body>
</html>
