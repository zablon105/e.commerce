<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e.commerce | Cart</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
<header class="navbar">
    <div class="logo">e.commerce</div>
    <a class="back-link" href="index.html">← Back to Store</a>
</header>

<section class="cart" id="cart-section">
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: Ksh <span id="total">0</span></h3>
    <div id="cart-empty" class="empty" hidden>No items in your cart yet.</div>
</section>

<script>
const currencyLabel = 'Ksh';
const cart = JSON.parse(localStorage.getItem('cart')) || [];

function renderCart(){
    const cartItemsEl = document.getElementById('cart-items');
    const totalEl = document.getElementById('total');
    const emptyEl = document.getElementById('cart-empty');

    cartItemsEl.innerHTML = '';

    if(cart.length === 0){
        emptyEl.hidden = false;
        totalEl.textContent = '0';
        return;
    }

    emptyEl.hidden = true;

    let total = 0;
    cart.forEach(item => {
        const li = document.createElement('li');
        const itemInfo = document.createElement('span');
        itemInfo.textContent = `${item.name} x${item.quantity} - ${currencyLabel} ${item.price * item.quantity}`;

        const removeBtn = document.createElement('button');
        removeBtn.innerHTML = '<i class="fa-solid fa-trash"></i> Remove';
        removeBtn.className = 'remove-cart-btn';
        removeBtn.type = 'button';
        removeBtn.onclick = () => removeFromCart(item.name);

        li.appendChild(itemInfo);
        li.appendChild(removeBtn);
        cartItemsEl.appendChild(li);

        total += item.price * item.quantity;
    });

    totalEl.textContent = total;
}

function removeFromCart(name){
    const index = cart.findIndex(item => item.name === name);
    if(index === -1) return;

    cart.splice(index, 1);
    localStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
}

renderCart();
</script>
</body>
</html>
